- id: pr-a5bbff2
  plan: plan-b7926f4
  title: Three-or-more player game E2E tests
  branch: pm/pr-a5bbff2-three-or-more-player-game-e2e-tests
  status: merged
  depends_on:
  - pr-3687ade
  description: 'All existing multiplayer tests use exactly 2 players. The game is
    designed for family play with siblings, so 3+ player games are a core use case.
    The `createPlayerContext` helper already supports creating additional browser
    contexts. The waiting room shows "Players (n/maxPlayers)" and the Start Game button
    enables when `players.length >= 2`.


    **Test cases to implement** (use 120s timeout — 3 browser contexts are heavier):

    (1) `"three players can join a room and see each other"`: Player 1 creates a room,
    Player 2 and Player 3 join with the room code. All three pages should show all
    three player names in the player list. The player count should show "3/". The
    host''s Start Game button should be enabled.

    (2) `"3-player game: first elimination shows spectator overlay only for eliminated
    player"`: Start a 3-player game. Player 1 hard-drops rapidly to top out. Player
    1 should see `[data-testid="spectator-overlay"]` with text "ELIMINATED" and "You
    placed 3rd". Players 2 and 3 should NOT see the spectator overlay on their own
    screens — they should still see the active game (`[data-testid="game-multiplayer"]`).
    Verify Player 2 and Player 3 can still interact (send a hard drop on each to confirm
    the game is still active).

    (3) `"3-player game: second elimination ends game and shows correct placements"`:
    After Player 1 tops out, have Player 2 hard-drop rapidly to also top out. Now
    all three should see `[data-testid="game-results"]`. Verify placements: Player
    3 (last standing) sees "VICTORY" and "1st". Player 2 sees "DEFEATED" and "2nd".
    Player 1 sees "DEFEATED" and "3rd". On every player''s results table (`[data-testid="results-table"]`),
    there should be 3 `.results-row` elements with all three player names.

    (4) `"3-player game: opponent boards are shown for all opponents"`: During an
    active 3-player game, each player should see 2 opponent mini-boards. Verify each
    player''s page has 2 opponent board elements visible (check for `[data-testid^="opponent-board"]`
    or the OpponentBoard component''s container).

    (5) `"targeting selector appears in 3-player game"`: Start a 3-player game. Verify
    `[data-testid="targeting-selector"]` is visible on each player''s page. Verify
    it shows the strategy buttons (at minimum "Random" via `[data-testid="targeting-btn-random"]`).
    Click a different strategy button and verify it becomes active (gets the active
    styling).


    **INPUT_REQUIRED**: Manual verification that 3-player game UI layout looks correct
    — opponent boards are properly sized and positioned, targeting selector is usable,
    elimination/spectator transitions are smooth. Also verify that results screen
    placements (1st/2nd/3rd) display correctly for all three players.


    Tests: `e2e/multiplayer-3player.spec.ts` (new)


    Files: `e2e/multiplayer-3player.spec.ts` (new)'

  status: in_review
  depends_on:
  - pr-3687ade
  description: '**Root cause**: The server''s `game-session.ts` broadcasts two garbage-related
    messages — `garbageQueued` (lines 703-708, sent whenever a player''s pending garbage
    queue changes, containing the full `pendingGarbage` array) and `garbageReceived`
    (lines 646-652, sent when garbage is ready to insert into the board). However,
    `lobby-client.ts` has handlers for `gameStateSnapshot`, `gameStarted`, `gameOver`,
    etc. but **no handler** for `garbageQueued` or `garbageReceived`. This means the
    receiving player''s client only learns about incoming garbage when the next periodic
    `gameStateSnapshot` arrives, which is at a much lower frequency and creates visible
    lag.



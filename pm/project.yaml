- id: pr-3414828
  plan: plan-b7926f4
  title: Multiplayer rematch flow E2E tests
  branch: pm/pr-3414828-multiplayer-rematch-flow-e2e-tests
  status: merged
  depends_on:
  - pr-3687ade
  description: 'The rematch flow has no E2E coverage. The results screen (`GameResults.tsx`)
    has three buttons: "REMATCH" (`[data-testid="rematch-btn"]`), "BACK TO LOBBY"
    (`[data-testid="back-to-lobby"]`), and "VIEW STATS" (`[data-testid="view-stats"]`).
    When a player clicks REMATCH, the button text changes to "WAITING..." (disabled),
    and a rematch status line (`[data-testid="rematch-status"]`) appears showing "{n}/{total}
    voted for rematch". When all players vote, a new game countdown should start.


    **Test cases to implement** (use 90s timeout, reuse the `setupAndStartGame` +
    `forceTopOut` pattern from `multiplayer-game.spec.ts`):

    (1) `"clicking rematch shows waiting state"`: Play a game to completion (host
    hard-drops to top out). On the host''s results screen, click `[data-testid="rematch-btn"]`.
    Assert the button becomes disabled and shows "WAITING...". Assert `[data-testid="rematch-status"]`
    shows "1/2 voted for rematch".

    (2) `"opponent sees rematch vote count update"`: After host votes for rematch,
    on the guest''s page assert `[data-testid="rematch-status"]` shows "1/2 voted
    for rematch" (guest hasn''t voted yet).

    (3) `"both players accepting rematch starts a new game"`: Both players click rematch.
    Wait for `[data-testid="game-multiplayer"]` to appear on both pages (new game
    started). Verify the results screen is no longer visible.

    (4) `"back to lobby returns both players to lobby"`: Play a game to completion.
    Host clicks `[data-testid="back-to-lobby"]`. Verify host''s page shows the lobby
    menu (e.g., "Create Room" and "Join Room" buttons visible). The guest should also
    be returned to the lobby (or see a "host left" message). Note: the exact behavior
    when one player leaves may vary — the test should verify the guest isn''t stuck
    on a dead results screen.

    (5) `"rematch button cannot be clicked twice"`: Click rematch once, verify button
    is disabled (`[data-testid="rematch-btn"]` has `disabled` attribute), attempt
    to click again, verify vote count is still 1/2 (not 2/2).


    **INPUT_REQUIRED**: Manual verification that the rematch UI transitions look correct
    — button state changes, countdown animation before new game, and that both players''
    screens stay in sync throughout the flow.


    Tests: `e2e/multiplayer-rematch.spec.ts` (new)


    Files: `e2e/multiplayer-rematch.spec.ts` (new)'

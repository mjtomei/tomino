  description: 'Implement piece movement (left, right, soft drop) and rotation via
    the `RotationSystem` interface. Movement checks collision with board walls and
    placed cells. Rotation delegates to the active rotation system which returns kick
    offsets to try — the movement module accepts the first non-colliding offset. Works
    identically for SRS (with kicks) and NRS (no kicks, just base rotation). **Human
    testing not needed** — pure logic verified by unit tests.


    Tests: Unit tests for: moving left/right, collision with walls, collision with
    placed pieces, soft drop. With SRS: rotation through all 4 states, wall kicks
    trigger on obstruction, I-piece kicks, blocked when all kicks fail. With NRS:
    2-state rotation for I/S/Z, no kicks attempted, rotation blocked on collision.



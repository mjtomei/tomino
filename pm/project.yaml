- id: pr-1bab92a
  plan: plan-c686698
  title: Garbage targeting strategies and attack power
  branch: pm/pr-1bab92a-garbage-targeting-strategies-and-attack-power
  status: merged
  depends_on:
  - pr-7a9a7e5
  - pr-1389028
  description: 'Implement configurable garbage targeting for multiplayer games. Room
    settings define which targeting strategies are available (any combination of:
    random, attackers, KOs, manual). Each player selects their active strategy, changeable
    mid-game.


    **Targeting strategies:**

    - **Random** — garbage sent to a random opponent (default)

    - **Attackers** — automatically targets players currently targeting you

    - **KOs** — targets the player closest to topping out

    - **Manual** — player clicks an opponent board to select a specific target


    **Attack power multiplier:**

    Track a per-player attack power multiplier on the server. KOs increase the multiplier
    at thresholds (e.g. 1 KO → 1.25x, 2 → 1.5x, 4 → 1.75x, 6+ → 2x). The multiplier
    is applied to outgoing garbage at distribution time in the garbage manager. Broadcast
    current multiplier to clients for UI display.


    **Game settings integration:**

    Add targeting configuration to room/game settings: `enabledStrategies: TargetingStrategy[]`,
    `defaultStrategy: TargetingStrategy`. Settings are chosen by the host in the waiting
    room.


    **Manual targeting UI:**

    Player clicks/taps an opponent''s mini-board to select them as target. Highlight
    the targeted opponent board with a colored border. Show a small targeting mode
    indicator on the player''s HUD.


    **Human testing needed**: verify strategy switching mid-game, manual target selection
    by clicking opponent boards, and attack power scaling after KOs across multiple
    browser tabs.


    Tests: Each targeting strategy selects correct target(s), attack power multiplier
    calculation at KO thresholds, multiplier applied to outgoing garbage correctly,
    strategy switching mid-game, manual target persistence across rounds, game settings
    validation (at least one strategy enabled), attacker strategy retaliation logic,
    KO strategy targets lowest-health player


    Files: `server/targeting.ts`, `server/attack-power.ts`, `server/garbage-manager.ts`
    (extend with targeting + multiplier), `shared/targeting-types.ts`, `shared/protocol.ts`
    (add targeting messages), `src/ui/TargetingSelector.tsx`, `src/ui/OpponentBoard.tsx`
    (extend with target selection), `src/net/game-client.ts` (extend with targeting
    commands)'

- id: pr-77a4924
  plan: plan-b7926f4
  title: Stats screen and post-game UI E2E tests
  branch: pm/pr-77a4924-stats-screen-and-post-game-ui-e2e-tests
  status: merged
  depends_on:
  - pr-3687ade
  description: 'The stats screen (`StatsScreen.tsx`) loads data from `/api/stats/{username}`
    and displays: a rating card (rating value, RD, games played, rank badge), a "Rating
    Over Time" sparkline chart, and a match history table with columns (Opponent,
    Result, Rating Change, Date). It has a "Back" button (`.stats-back-btn`). The
    results screen (`GameResults.tsx`) has stat columns per player (Sent, Recv, Pieces,
    Lines, Score, Time) and optional rating changes with animated reveal. A handicap
    summary section appears when handicap modifiers were active.


    **Test cases to implement** (90s timeout):

    (1) `"view stats button opens stats screen"`: Play a 2-player game to completion.
    On the winner''s results screen, click `[data-testid="view-stats"]`. Verify the
    stats screen appears (look for `.stats-screen` or heading "Stats for {name}").
    The stats screen fetches from `/api/stats/{username}` — verify it doesn''t show
    an error (`.stats-empty` with "Error:" text should not be present). If the stats
    API returns data, verify the rating card is visible.

    (2) `"stats screen back button returns to results"`: From the stats screen, click
    `.stats-back-btn`. Verify the results screen (`[data-testid="game-results"]`)
    is visible again.

    (3) `"results table shows plausible stat values for both players"`: After a game
    where the host hard-dropped many pieces, verify on the results screen: the results
    table has 2 rows. For each row, the "Pieces" column should be a positive number
    (at least 1). The "Score" column should be a non-negative number. The "Time" column
    should match a time format like "0:XX" or "X:XX". Extract values using `page.locator(''[data-testid="results-table"]
    .results-row'')`.nth(0).locator(''.cell-stat'')` and checking `textContent()`
    for each of the 6 stat cells.

    (4) `"results table stat values are non-negative numbers"`: For every `.cell-stat`
    in the results table (excluding the Time column which is a formatted string),
    parse the text content and verify it''s a valid non-negative integer (after removing
    locale formatting like commas).

    (5) `"match history appears after playing a game"`: Play a game to completion.
    Open the stats screen. If the match history table (`.stats-table`) is visible,
    verify it has at least 1 row in `tbody`. Each row should have 4 cells (Opponent,
    Result, Rating Change, Date). The Result cell should contain either "Win" or "Loss".

    (6) `"rating changes appear on results screen"`: After the game ends, verify that
    `[data-testid^="rating-"]` elements appear on the results screen (one per player).
    Each should contain a numeric rating value (`.rating-value`) and a delta (`.rating-delta`
    with "+" or "-" prefix). Wait up to 5s for the rating elements since they arrive
    async.


    **INPUT_REQUIRED**: Manual verification that the stats screen renders correctly
    — rating card layout, sparkline chart visibility, match history table formatting.
    Also verify the animated rating reveal on the results screen plays smoothly.


    Tests: `e2e/stats-screen.spec.ts` (new)


    Files: `e2e/stats-screen.spec.ts` (new)'

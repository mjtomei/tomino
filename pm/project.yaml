  description: 'Hook into Plan 2''s auto-targeting system to bias garbage distribution
    based on skill ratings in 3+ player games. When a player hasn''t manually selected
    a target, compute a weighted probability distribution across opponents: stronger
    players'' garbage skews toward other strong players, weaker players'' garbage
    skews toward their highest-rated opponent (biggest threat). The bias strength
    is configurable (0.0 = uniform random, 1.0 = fully skill-weighted). Manual target
    selection always overrides — if a player picks a target, their garbage goes there
    with no bias. In 2-player games this is a no-op. Implemented as a targeting strategy
    that Plan 2''s garbage distribution calls into. **INPUT_REQUIRED: Human testing
    needed** in 3+ player games to verify targeting feels natural and not obviously
    rigged.


    Tests: 2-player game bypasses targeting bias entirely, 3-player game with equal
    ratings produces uniform distribution, large skill gap biases toward expected
    targets, bias strength 0.0 produces uniform, bias strength 1.0 produces deterministic
    targeting, manual target override ignores bias completely, eliminated players
    excluded from targeting.



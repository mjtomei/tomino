    maintenance, no misdrops, low max board height) that when high enough for a sustained
    duration triggers a "flow" atmosphere state. In flow state, the background opens
    up dramatically, colors saturate, particles intensify, the music hits a sustained
    groove with extra harmonic layers, and a subtle visual "aura" appears around the
    board. Breaking the flow (topping out, missing a clear, big misdrop) smoothly
    exits the state. This is Tetris-Effect''s "Zone" reimagined as an emergent reward
    for the player getting into rhythm. **Human testing needed**: detection sensitivity
    (not too easy, not too hard to trigger), how it feels to enter and exit, whether
    it feels rewarding without being disruptive.



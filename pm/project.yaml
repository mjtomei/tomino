  description: 'Implement keyboard input handling that maps keys to engine actions.
    DAS and ARR values are read from the active rule set. Actions gated by rule set:
    hard drop key ignored when `hardDropEnabled=false`, hold key ignored when `holdEnabled=false`.
    Key mappings: left/right arrows for movement, up for CW rotation, Z for CCW, space
    for hard drop, down for soft drop, shift for hold, escape for pause. DAS/ARR feel
    must be snappy — ARR=0 means instant teleport on DAS charge. **INPUT_REQUIRED:
    Human testing needed** to verify responsiveness under both Classic DAS (sluggish,
    authentic) and Modern DAS (fast, tetr.io-like), and that disabled actions are
    properly ignored.


    Tests: Unit tests for: key→action mapping, DAS delay before repeat, ARR repeat
    rate, ARR=0 instant move, hard drop key ignored when disabled, hold key ignored
    when disabled.


    Files: `src/input/keyboard.ts`, `src/input/keyboard.test.ts`'

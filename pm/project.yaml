  - pr-8d8faf9
  description: 'Add a `GameTestHarness` class that wraps the engine for integration-level
    testing. API: `new GameTestHarness({ seed, ruleSet?, startLevel? })` creates a
    game, then `harness.input(action)` or `harness.inputs([action1, action2, ...])`
    feeds inputs, and `harness.state` returns the current `GameStateSnapshot`. Also
    supports `harness.tickUntil(predicate)` for advancing past lock delays. This enables
    testing full state transitions (piece lock → line clear → garbage insert → next
    piece spawn) without timers. Depends on the engine existing, so this PR also defines
    the minimal engine interface it expects (which engine PRs will implement). No
    human-guided testing needed.


    Tests: Harness initializes with correct defaults, inputs are applied in order,
    state is accessible after each input, tickUntil advances correctly, deterministic
    (same seed + inputs = same state)


    Files: `packages/shared/src/__test-utils__/game-harness.ts`, `packages/shared/src/__test-utils__/game-harness.test.ts`,
    `packages/shared/src/__test-utils__/index.ts`'

- id: pr-6060eaf
  plan: plan-48e829d
  title: Scoring systems — Guideline and NES
  branch: pm/pr-6060eaf-scoring-systems-guideline-and-nes
  status: pending
  depends_on:
  - pr-698f2b5
  description: 'Implement the `ScoringSystem` interface with two implementations.
    **GuidelineScoring**: base points × level for clears (100/300/500/800), T-spin
    detection (3-corner rule) with mini/full bonuses, combo counter (+50 × combo),
    back-to-back 1.5x for consecutive difficult clears, perfect clear bonuses, soft
    drop (1/cell) and hard drop (2/cell). **NESScoring**: classic formula (40/100/300/1200
    × (level+1)), soft drop (1/cell), no T-spins, no combos, no B2B. Each scoring
    system includes its own gravity curve (level → drop interval mapping). **Human
    testing not needed** — pure logic verified by unit tests.


    Tests: Unit tests for: Guideline — points for each clear type at various levels,
    T-spin 3-corner detection, mini vs full, combo escalation, combo reset, B2B bonus,
    perfect clear bonus, hard/soft drop points. NES — points for each clear type at
    various levels, soft drop points, no T-spin/combo/B2B. Gravity — guideline curve
    values, NES curve (48 frames at L0, 1 frame at L29).


    Files: `src/engine/scoring.ts`, `src/engine/scoring-guideline.ts`, `src/engine/scoring-nes.ts`,
    `src/engine/gravity.ts`, `src/engine/scoring.test.ts`'

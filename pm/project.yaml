  description: '**This is the foundation PR that all E2E test PRs depend on.** It
    has two parts: (A) new Playwright helpers and (B) data-testid attributes on UI
    components.


    **Part A — New helpers** (all in `e2e/helpers/`):

    - `holdKey(page, key, durationMs)` in `input.ts`: press a key down, wait `durationMs`,
    then release. Uses `page.keyboard.down(key)` / `page.keyboard.up(key)` with a
    `page.waitForTimeout(durationMs)` in between. Return type void.

    - `readScoreDisplay(page)` in `game-state.ts`: read the `[data-testid="score-display"]`
    element and parse out all `.stat-row` children. Return `{ score?: number, level?:
    number, lines?: number, time?: string, remaining?: number }` by matching `.stat-label`
    text (SCORE/LEVEL/LINES/TIME/REMAINING) and extracting `.stat-value` text content.

    - `waitForElimination(page, timeoutMs?)` in `game-state.ts`: wait for `[data-testid="spectator-overlay"]`
    to be visible.

    - `setupSoloGame(page, options: { preset?: "classic" | "modern" | "custom", mode?:
    "marathon" | "sprint" | "ultra" | "zen" })` in `solo.ts` (new file): navigate
    to `/`, click `[data-testid="preset-{preset}"]` to select ruleset (default "modern"),
    click `[data-testid="mode-{mode}"]` to select game mode (default "marathon"),
    click `[data-testid="start-play"]`, then wait for either `[data-testid="game-board"]`
    or the game canvas to be visible (confirming the game started). The StartScreen
    already has these testid attributes.

    - Re-export all new helpers from `index.ts`.


    **Part B — data-testid attributes** to add to UI components (only add attributes,
    do not change logic or layout):

    - `ScoreDisplay.tsx`: already has `data-testid="score-display"` on the container.
    **Add** `data-testid="stat-{stat}"` to each `StatRow`''s outer div (e.g., `data-testid="stat-score"`,
    `data-testid="stat-level"`).

    - `GameShell.tsx`: **Add** `data-testid="game-board"` to the main game board container
    div (the one wrapping BoardCanvas). The pause and game-over overlays already have
    testids in `Overlay.tsx` — use the existing names: `data-testid="pause-overlay"`
    and `data-testid="gameover-overlay"`.

    - `GarbageMeter.tsx`: already has `data-testid="garbage-meter"` — no changes needed.

    - `NextQueue.tsx`: already has `data-testid="next-queue"` — no changes needed.

    - `HoldDisplay.tsx`: already has `data-testid="hold-display"` and passes `testId="hold-piece"`
    to PiecePreview — no changes needed.

    - `Overlay.tsx`: already has `data-testid="pause-overlay"` and `data-testid="gameover-overlay"`
    — no changes needed.


    **Note for downstream PRs**: The existing overlay testids are `pause-overlay`
    and `gameover-overlay` (NOT `game-paused-overlay` / `game-over-overlay`). All
    E2E tests must use these existing names.


    No human testing needed — helper correctness is verified by the tests in subsequent
    PRs.



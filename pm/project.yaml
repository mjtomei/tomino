- id: pr-3b2b0fc
  plan: plan-45cb304
  title: Balancing middleware for garbage pipeline
  branch: pm/pr-3b2b0fc-balancing-middleware-for-garbage-pipeline
  status: merged
  depends_on:
  - pr-998f69e
  - pr-7a9a7e5
  - pr-940a121
  - pr-d8c0916
  - pr-8d8faf9
  description: 'Implement `BalancingMiddleware` that wraps Plan 2''s garbage manager.
    At game start, computes the full modifier matrix from all players'' ratings (one
    entry per sender→receiver pair). When garbage is sent from player A to player
    B, looks up the (A, B) modifier and applies: (1) multiply garbage line count by
    the pair''s multiplier (round probabilistically — e.g., 0.3x on 4 lines = 1 line
    80% of the time, 2 lines 20%), (2) if delay modifier is enabled, adjust the garbage
    delay window for that pair, (3) if messiness modifier is enabled, adjust gap randomization.
    Multiplier can go all the way to 0.0, meaning garbage from that sender is completely
    absorbed. The middleware is injected between the garbage calculator and the network
    distribution layer. When handicap is disabled, passes through unchanged. **INPUT_REQUIRED:
    Human testing needed** to verify garbage feels right during actual play — automated
    tests confirm math but not game feel.


    Tests: Garbage passthrough when handicap disabled, per-pair modifiers applied
    correctly (A→B differs from A→C), 0.0 multiplier blocks all garbage, probabilistic
    rounding averages correctly over many samples, modifier matrix recomputed correctly
    for player count, optional delay/messiness modifiers only apply when toggled on,
    integration test with mock garbage manager.


    Files: `server/balancing-middleware.ts`, `server/balancing-middleware.test.ts`,
    `server/game-session.ts` (extend to inject middleware)'

- id: pr-0d483af
  plan: plan-48e829d
  title: TetrisEngine — game loop and state machine
  branch: pm/pr-0d483af-tetrisengine-game-loop-and-state-machine
  status: pending
  depends_on:
  - pr-ac2a70b
  - pr-3c6d5aa
  - pr-6060eaf
  description: 'Implement the core `TetrisEngine` class that takes a `RuleSet` and
    `GameMode` config, instantiates the appropriate rotation system, randomizer, and
    scoring system, and ties them together with the board and movement modules. Manages
    game states (idle, playing, paused, game over). Runs gravity ticks per the active
    gravity curve. Lock delay behavior driven by rule set (0 = instant lock, >0 =
    delay with configurable max resets). Hard drop availability driven by rule set.
    Game mode controls end conditions: Marathon = top-out, Sprint = 40 lines cleared,
    Ultra = 3min timer expires, Zen = manual quit only. Emits complete game state
    snapshots. Zero browser dependencies. **Human testing not needed** — pure logic
    verified by unit tests.


    Tests: Unit tests for: engine initializes from rule set + mode, start/pause/game-over
    transitions. With Modern rules: gravity at correct interval, lock delay with resets,
    hard drop works, hold works, ghost position correct. With Classic rules: instant
    lock, no hard drop action, no hold, no ghost in state. Game modes: Marathon ends
    on top-out, Sprint ends at 40 lines (records time), Ultra ends after 3min (records
    score), Zen has no gravity and no top-out. State snapshot contains all data needed
    by renderer.


    Files: `src/engine/engine.ts`, `src/engine/engine.test.ts`'

  description: 'Add a `GameTestHarness` class that wraps the engine for integration-level
    testing. API: `new GameTestHarness({ seed, ruleSet?, startLevel? })` creates a
    game, then `harness.input(action)` or `harness.inputs([action1, action2, ...])`
    feeds inputs, and `harness.state` returns the current `GameStateSnapshot`. Also
    supports `harness.tickUntil(predicate)` for advancing past lock delays. This enables
    testing full state transitions (piece lock → line clear → garbage insert → next

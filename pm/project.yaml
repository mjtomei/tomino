  description: "Rename the project throughout the codebase from \"Tetris\" to \"Tomino\"\
    \ to distance from the Tetris trademark. Also replace the user-visible/code-symbol\
    \ term \"tetris\" (as a 4-line clear) with \"quad\" (matching competitive-scene\
    \ practice: tetr.io, Jstris). And replace the Tetris Guideline piece-color palette\
    \ with three selectable in-house palettes — the Guideline colors were specifically\
    \ cited as protected expression in *Tetris Holding v. Xio Interactive*, and switching\
    \ palettes is the highest-leverage legal-distance change.\n\n## Scope\n\nThree\
    \ coordinated changes in one PR:\n\n1. **Project identity:** \"Tetris\" → \"Tomino\"\
    \ (package names, titles, README, UI, engine class, localStorage keys).\n2. **Genre\
    \ term:** \"tetris\" (4-line clear) → \"quad\" (event variant names, method names,\
    \ variable names, user-visible strings, and descriptive test/comment prose).\n\
    3. **Piece colors:** replace the Guideline palette with three selectable palettes,\
    \ default to \"Synthwave\".\n\n### Part 1 — Project identity rename (Tetris →\
    \ Tomino)\n\n1. **Root package.json** — `\"name\": \"tetris\"` → `\"name\": \"\
    tomino\"`\n2. **Workspace package names** — rename npm scope `@tetris/*` → `@tomino/*`:\n\
    \   - `packages/shared/package.json` — `@tetris/shared` → `@tomino/shared`\n \
    \  - `packages/server/package.json` — `@tetris/server` → `@tomino/server`, plus\
    \ its `@tetris/shared` dependency\n   - `packages/client/package.json` — same\
    \ treatment\n   - Update all `from \"@tetris/shared\"` imports across the codebase\
    \ to `from \"@tomino/shared\"`\n   - Regenerate `package-lock.json` (run `npm\
    \ install` after package.json edits)\n3. **README.md** — title `# Tetris` → `#\
    \ Tomino`, first paragraph \"Multiplayer Tetris with adaptive…\" → \"Multiplayer\
    \ block-stacking game with adaptive…\". Keep technical mentions (SRS, NES scoring)\
    \ as-is — those are spec references.\n4. **packages/client/index.html** — `<title>Tetris</title>`\
    \ → `<title>Tomino</title>`\n5. **packages/server/src/index.ts** — `\"Tetris server\
    \ listening…\"` log → `\"Tomino server listening…\"`\n6. **Lobby UI** — `packages/client/src/ui/Lobby.tsx`\
    \ shows \"Tetris\" as the app title. Change to \"Tomino\". Update `packages/client/src/__tests__/Lobby.test.tsx`\
    \ (`expect(screen.getByText(\"Tetris\"))` → `\"Tomino\"`).\n7. **localStorage\
    \ keys** — rename `tetris.*` / `tetris-player-name` → `tomino.*` / `tomino-player-name`:\n\
    \   - `packages/client/src/audio/use-music.ts` — `tetris.music.volume`, `tetris.music.muted`\n\
    \   - `packages/client/src/atmosphere/settings-context.ts` — `tetris.sfx.volume`,\
    \ `tetris.master.muted`, `tetris.effects.intensity`\n   - `packages/client/src/atmosphere/theme-context.tsx`\
    \ — `tetris.theme`, `tetris.genre`\n   - `packages/client/src/__tests__/App.test.tsx`\
    \ and wherever the app code sets it — `tetris-player-name`\n   Acceptable that\
    \ existing users lose their saved settings on next load — no migration needed.\n\
    8. **`TetrisEngine` class** — rename to `TominoEngine` throughout:\n   - `packages/shared/src/engine/engine.ts`\
    \ (class declaration and doc comment)\n   - `packages/shared/src/index.ts` (re-export)\n\
    \   - All imports and usages in client, server, and tests (engine-proxy.ts, player-engine.ts,\
    \ engine.test.ts, etc.)\n9. **Prose docs** — in `docs/pm-demo-narrative.md`, `notes.txt`,\
    \ and `plans/*.md`, update descriptions of *our project* (\"multiplayer Tetris\
    \ game\" → \"multiplayer Tomino game\"). Keep references to the standards (\"\
    Tetris Guideline\", \"NES Tetris\", \"Tetris 99\", `tetris.wiki` URLs) — those\
    \ are external specs/products, not us, and are protected by nominative fair use.\n\
    \n### Part 2 — Genre term rename (\"tetris\" → \"quad\" for the 4-line clear)\n\
    \nThe term \"tetris\" meaning a 4-line clear is a gray-area trademark use when\
    \ it appears in user-visible text or as a public code symbol. The competitive\
    \ scene uses **\"quad\"**. Replace in code and user-facing strings.\n\n1. **Event\
    \ variant type strings** — change `\"tetris\"` to `\"quad\"` everywhere the event\
    \ discriminator is defined, matched, or emitted:\n   - `packages/client/src/atmosphere/board-effects.ts`\
    \ — the `BoardEffectEvent` union variant and call site; rename the method `spawnTetrisBurst`\
    \ → `spawnQuadBurst`\n   - `packages/client/src/atmosphere/event-bursts.ts` —\
    \ switch case `\"tetris\"` → `\"quad\"`\n   - `packages/client/src/atmosphere/atmosphere-engine.ts`\
    \ — `events.push({ type: \"tetris\", … })` → `\"quad\"`\n   - `packages/client/src/atmosphere/menu-atmosphere.ts`\
    \ — `{ type: \"tetris\", magnitude: 4 }` → `\"quad\"`\n   - `packages/client/src/atmosphere/ScreenEffects.tsx`\
    \ — event type check `e.type === \"tetris\"` → `\"quad\"`\n   - `packages/client/src/atmosphere/screen-effects.ts`\
    \ — comments referencing \"(tetris)\" → \"(quad)\"\n   - `packages/client/src/atmosphere/opponent-reactions.ts`\
    \ — `OpponentReaction` union `\"tetris\"` → `\"quad\"`, switch case, and reaction\
    \ emitter\n   - `packages/client/src/audio/music-engine.ts` — `ev.type === \"\
    tetris\"` → `\"quad\"`, plus comment\n   - `packages/client/src/audio/use-music.ts`\
    \ — `[{ type: \"tetris\", magnitude: 4 }]` → `\"quad\"`\n   - Update all corresponding\
    \ tests (`packages/client/src/atmosphere/__tests__/*.test.ts`, `e2e/*.spec.ts`,\
    \ `packages/client/src/audio/sounds.test.ts`) to use `\"quad\"` in event creation,\
    \ assertions, and variable names (`tetrisCount` → `quadCount`)\n2. **Shared engine\
    \ prose** — in `packages/shared/src/engine/*.ts` doc comments and `packages/shared/src/engine/*.test.ts`\
    \ test descriptions, change references like `\"sends 4 garbage for a Tetris\"\
    `, `\"clears a Tetris (4 lines)\"`, `\"awards 800 × level for a tetris\"`, `\"\
    first tetris sets b2b=0\"`, `\"PC Tetris\"` → use \"quad\". Same for `packages/shared/src/__tests__/reference-nes.test.ts`\
    \ and `reference-guideline.test.ts` test labels and data table labels (`{ lines:\
    \ 4, label: \"Tetris\" }` → `\"Quad\"`, `{ action: \"Tetris\", lines: 4 }` → `{\
    \ action: \"Quad\", … }`).\n3. **User-visible \"Tetris!\" strings** — search the\
    \ client for any announcer/toast/overlay text saying \"Tetris\" as a clear name\
    \ and replace with \"Quad\".\n\n### Part 3 — Piece color palettes\n\nReplace the\
    \ single hardcoded Guideline palette in `packages/client/src/ui/colors.ts` with\
    \ three named, selectable palettes. The Guideline palette was specifically cited\
    \ as protected expression in *Tetris Holding v. Xio Interactive* (2012), and replacing\
    \ it is the single most important legal-distance change.\n\n#### Palette definitions\n\
    \nCreate `packages/client/src/ui/palettes.ts` (new file) with:\n\n```ts\nimport\
    \ type { PieceType } from \"@tomino/shared\";\n\nexport type PaletteId = \"synthwave\"\
    \ | \"jewel\" | \"muted\";\n\nexport interface Palette {\n  id: PaletteId;\n \
    \ name: string;\n  colors: Record<PieceType, string>;\n}\n\nexport const PALETTES:\
    \ Record<PaletteId, Palette> = {\n  synthwave: {\n    id: \"synthwave\",\n   \
    \ name: \"Synthwave\",\n    colors: {\n      I: \"#00F5D4\", // mint-aqua\n  \
    \    O: \"#FEE440\", // warm yellow\n      T: \"#9B5DE5\", // lavender\n     \
    \ S: \"#06D6A0\", // emerald\n      Z: \"#EF476F\", // watermelon\n      J: \"\
    #118AB2\", // steel blue\n      L: \"#FB8500\", // pumpkin\n    },\n  },\n  jewel:\
    \ {\n    id: \"jewel\",\n    name: \"Jewel\",\n    colors: {\n      I: \"#2A9D8F\"\
    , // deep teal\n      O: \"#E9C46A\", // gold\n      T: \"#9D4EDD\", // amethyst\n\
    \      S: \"#52B788\", // forest\n      Z: \"#E63946\", // crimson\n      J: \"\
    #3A86FF\", // cobalt\n      L: \"#E76F51\", // terracotta\n    },\n  },\n  muted:\
    \ {\n    id: \"muted\",\n    name: \"Muted\",\n    colors: {\n      I: \"#8ECAE6\"\
    , // soft sky\n      O: \"#F4E285\", // buttercream\n      T: \"#CDB4DB\", //\
    \ dusty lilac\n      S: \"#B5E48C\", // sage\n      Z: \"#E07A5F\", // clay\n\
    \      J: \"#6A7FDB\", // periwinkle\n      L: \"#F4A261\", // apricot\n    },\n\
    \  },\n};\n\nexport const DEFAULT_PALETTE_ID: PaletteId = \"synthwave\";\n\nexport\
    \ function getPalette(id: string): Palette {\n  return PALETTES[id as PaletteId]\
    \ ?? PALETTES[DEFAULT_PALETTE_ID];\n}\n```\n\n#### Wire into existing theme system\n\
    \nThe codebase already has a `ThemeProvider` (`packages/client/src/atmosphere/theme-context.tsx`)\
    \ with `themeId` and `genreId` axes. Add a third axis `paletteId` alongside them:\n\
    \n- Add `paletteId: string`, `palette: Palette`, `setPaletteId: (id: string) =>\
    \ void` to `ThemeContextValue`.\n- Add a localStorage key constant `PALETTE_STORAGE_KEY\
    \ = \"tomino.palette\"` (use the `tomino.*` namespace per Part 1).\n- Read/write\
    \ the palette id the same way `themeId` and `genreId` are handled, using `PALETTES`\
    \ as the valid-set dict and `DEFAULT_PALETTE_ID` as the fallback.\n- Follow the\
    \ exact same pattern (`useState` initializer reading from localStorage, `useEffect`\
    \ to persist, `setPaletteId` with validity check against `PALETTES`).\n\n####\
    \ Rework colors.ts\n\nRefactor `packages/client/src/ui/colors.ts`:\n\n- **Remove**\
    \ the hardcoded `PIECE_COLORS` constant and the `/** Tetris Guideline piece colors.\
    \ */` comment.\n- **Keep** `darken`, `lighten`, `BOARD_BG`, `PANEL_BG` unchanged.\n\
    - **Add** a helper `getPieceColors(palette: Palette): Record<PieceType, string>`\
    \ that just returns `palette.colors` — or simpler, have callers use `palette.colors`\
    \ directly.\n- Update every current import of `PIECE_COLORS` from `colors.ts`\
    \ to instead read `palette.colors` from `useTheme()` (or equivalent theme hook).\
    \ Likely call sites include `BoardCanvas.tsx`, `OpponentBoard.tsx`, piece preview\
    \ components, and any other renderer that currently imports `PIECE_COLORS`. Grep\
    \ for `PIECE_COLORS` to find them all.\n\n#### Settings UI\n\nAdd a palette selector\
    \ to the existing settings panel (wherever theme/genre selectors live — check\
    \ `SettingsPanel.tsx`). The selector should show the three palette names (\"Synthwave\"\
    , \"Jewel\", \"Muted\") and ideally a small visual preview (7 colored squares,\
    \ one per piece). Match the style of the existing theme/genre selectors.\n\n####\
    \ Tests\n\n- Update any test that asserts specific hex values from the old Guideline\
    \ palette (e.g., `BoardCanvas.test.tsx`) to instead assert that the rendered color\
    \ matches the *current palette's* piece color, not a hardcoded hex. Or, where\
    \ the test is checking color-independence, render with a known palette and assert\
    \ against that palette's hex.\n- Add a small test for `palettes.ts` verifying\
    \ each palette has all 7 piece types defined with valid 7-char hex strings.\n\
    - Add a test for the `ThemeProvider` palette axis: set `paletteId`, verify it\
    \ persists to localStorage and that the exposed `palette` object updates.\n\n\
    ### Do NOT change\n\n- **External spec references** — \"Tetris Guideline\", \"\
    NES Tetris\", \"Tetris 99\", \"TetrisWiki\", `https://tetris.wiki/*` URLs in code\
    \ comments and test file headers. These are nominative fair use: citing the published\
    \ specifications by their real names, the same as citing RFCs. Removing them would\
    \ harm traceability without reducing legal risk.\n- **SRS rotation system, kick\
    \ tables, scoring values, garbage tables, combo tables, B2B logic, perfect-clear\
    \ bonuses, lock delay, DAS/ARR** — these are functional rules/algorithms, not\
    \ copyrightable expression (17 USC §102(b)). Keep implementations intact.\n- **10-wide\
    \ playfield** — de facto standard across every clone; leave as-is.\n- **`plans/01-core-tetris.md`\
    \ filename** — historical plan artifact.\n- **Files under `pm/`** (transcripts,\
    \ specs) — historical records, untouched.\n- **Repo directory `/home/matt/claude-work/tetris`**\
    \ — the user will rename the directory and GitHub remote separately to avoid breaking\
    \ the active pm session and worktrees.\n\n## Verification\n\n- `npm install` regenerates\
    \ `package-lock.json` cleanly\n- `npm run build` succeeds\n- `npm run lint` clean\n\
    - `npm test` passes (vitest)\n- `npm run dev:server` starts and logs \"Tomino\
    \ server listening…\"\n- `npm run dev` starts and the browser tab title shows\
    \ \"Tomino\"; the Lobby displays \"Tomino\"\n- Manually verify in the browser:\
    \ the default piece colors match the Synthwave palette; the settings panel has\
    \ a palette selector; switching to Jewel and Muted changes piece colors live and\
    \ persists across reload\n- Grep for remaining `@tetris/`, `\"name\": \"tetris\"\
    `, `\"name\": \"@tetris/`, `TetrisEngine`, or `tetris.` localStorage key prefixes\
    \ returns zero hits\n- Grep for `type: \"tetris\"` and `\"tetris\"` as an event\
    \ literal returns zero hits in `packages/client/src/atmosphere/**` and `packages/client/src/audio/**`\n\
    - Grep for `PIECE_COLORS` returns zero hits (all call sites migrated to palette-aware\
    \ rendering)\n- The old Guideline hex values (`#00D4D4`, `#E6C000`, `#A020D0`,\
    \ `#00C800`, `#D41400`, `#2020D4`, `#E08000`) appear nowhere in the codebase\n\
    - External references to \"Tetris Guideline\", \"NES Tetris\", and `tetris.wiki`\
    \ URLs in doc comments and test file headers remain intact"

  description: 'A layered procedural music system built on Web Audio API. Architecture:
    multiple concurrent "layers" (bass drone, rhythm/percussion, arpeggiated melody,
    lead/pad), each generated procedurally from the current genre config. Layers activate/deactivate
    based on atmosphere intensity thresholds — calm games have just a bass drone,
    intense moments bring in all layers. Tempo is driven by game speed/level. Danger
    shifts the musical mode (e.g., major to minor, or to diminished). Line clears
    trigger harmonic accents. Combos add rhythmic fills. Level-up triggers a brief
    key change or flourish. The engine crossfades between states smoothly. Genre config
    determines all musical parameters (scale, timbre, rhythm patterns). Includes a
    mute/volume control. **Human testing needed**: musical quality, genre variety,
    transitions between intensity levels, whether music feels connected to gameplay.


    Tests: Unit tests for layer activation thresholds, tempo calculation from game
    speed, scale/mode selection from atmosphere. Tests for note generation from genre

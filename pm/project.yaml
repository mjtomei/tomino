  title: Handicap calculation from skill gap
  branch: pm/pr-998f69e-handicap-calculation-from-skill-gap
  status: merged
  depends_on:
  - pr-c7b0d7c
  description: 'Given two players'' ratings, compute `HandicapModifiers` for a directed
    sender→receiver pair. Default mode ("boost"): when garbage flows from a stronger
    player to a weaker one, the receive multiplier is reduced (0.0–1.0) proportional
    to the rating gap via a smooth sigmoid curve. When garbage flows from weaker to
    stronger, the multiplier is always 1.0 (no boost). For 3+ player games, expose
    a function that takes all players'' ratings and returns a full modifier matrix
    indexed by (sender, receiver). No artificial floor — multiplier goes to 0.0 for
    extreme gaps. Optional "symmetric" mode also reduces the stronger player''s outgoing
    garbage. Delay and messiness modifiers computed but only applied when toggled
    on in lobby settings. Config constants control curve steepness. Pure functions,
    no server dependencies.


    Tests: Equal ratings produce 1.0 for both directions, large gap produces near-zero
    multiplier for stronger→weaker direction, weaker→stronger always 1.0 in default
    mode, symmetric mode reduces both directions, modifier matrix correct for 3 players
    (6 directed pairs), config overrides change curve shape, optional knobs (delay/messiness)
    only populate when enabled.


    Files: `server/handicap-calculator.ts`, `server/handicap-calculator.test.ts`,
    `server/handicap-config.ts`'

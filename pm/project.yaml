- id: pr-3c6d5aa
  plan: plan-48e829d
  title: Randomizer variants — 7-bag and pure random
  branch: pm/pr-3c6d5aa-randomizer-variants-7-bag-and-pure-random
  status: pending
  depends_on:
  - pr-1d0b36c
  description: 'Implement the `Randomizer` interface with two implementations. **SevenBagRandomizer**:
    shuffles all 7 pieces, deals them, refills when empty. **PureRandomRandomizer**:
    uniform random piece selection (classic style, allows repeats). Both maintain
    a piece queue (depth configurable via `previewCount`). Implement hold piece logic
    separately — swap current with held, one-hold-per-drop restriction, respects `holdEnabled`
    from rule set. **Human testing not needed** — pure logic verified by unit tests.


    Tests: Unit tests for: 7-bag — contains all 7, no repeats within bag, refills
    on exhaustion. Pure random — produces valid pieces, allows repeats. Both — queue
    stays filled to requested depth. Hold — swaps correctly, blocked when disabled,
    cannot hold twice per drop.


    Files: `src/engine/randomizer.ts`, `src/engine/randomizer-7bag.ts`, `src/engine/randomizer-pure.ts`,
    `src/engine/hold.ts`, `src/engine/randomizer.test.ts`'
